<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Emdaad Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: "#5A9E45", secondary: "#7EAF64", accent: "#f5f5f5", dark: "#252525" } }
            }
        }
    </script>
</head>
<body class="antialiased text-gray-800 bg-gray-50">
    <!-- Navigation -->
    <nav class="border-b border-gray-200 sticky top-0 bg-white/90 backdrop-blur-md z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-24">
                <a href="index.html" class="flex-shrink-0 flex items-center gap-2 cursor-pointer">
                    <img src="https://emdaadfood.com/wp-content/uploads/2024/02/Emdaad-logo.png" alt="Emdaad" class="h-16 object-contain">
                </a>
                <div class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-gray-600 font-medium hover:text-primary transition-colors pb-1">Home</a>
                    <a href="shop.html" class="text-gray-600 font-medium hover:text-primary transition-colors pb-1">Shop</a>
                    <a href="about.html" class="text-gray-600 font-medium hover:text-primary transition-colors pb-1">About us</a>
                    <a href="contact.html" class="text-dark font-medium hover:text-primary transition-colors border-b-2 border-primary pb-1">Contact us</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="bg-dark text-white py-12 relative overflow-hidden">
        <div class="absolute inset-0 bg-primary/10"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center">
            <h1 class="text-4xl font-bold mb-4">Contact Us</h1>
            <p class="text-gray-300 max-w-2xl mx-auto">We'd love to hear from you. Get in touch for wholesale inquiries.</p>
        </div>
    </div>

    <!-- Content -->
    <section class="py-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col lg:flex-row gap-12">
                <!-- Contact Info -->
                <div class="flex-1 space-y-8">
                    <div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm flex items-start gap-6">
                        <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center flex-shrink-0">
                            <i data-lucide="phone" class="w-8 h-8 text-primary"></i>
                        </div>
                        <div>
                            <h3 class="text-xl font-bold text-dark mb-2">Phone Number</h3>
                            <p class="text-gray-600 text-lg">+971 50 114 1181</p>
                            <p class="text-gray-400 text-sm mt-1">Mon-Sat from 9am to 6pm</p>
                        </div>
                    </div>
                    
                    <div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm flex items-start gap-6">
                        <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center flex-shrink-0">
                            <i data-lucide="mail" class="w-8 h-8 text-primary"></i>
                        </div>
                        <div>
                            <h3 class="text-xl font-bold text-dark mb-2">Email Address</h3>
                            <p class="text-gray-600 text-lg">info@emdaadfood.com</p>
                            <p class="text-gray-400 text-sm mt-1">We'll reply within 24 hours</p>
                        </div>
                    </div>

                    <div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm flex items-start gap-6">
                        <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center flex-shrink-0">
                            <i data-lucide="map-pin" class="w-8 h-8 text-primary"></i>
                        </div>
                        <div>
                            <h3 class="text-xl font-bold text-dark mb-2">Office Location</h3>
                            <p class="text-gray-600 text-lg">Dubai, United Arab Emirates</p>
                        </div>
                    </div>
                </div>

                <!-- Contact Form -->
                <div class="flex-1">
                    <div class="bg-white p-8 md:p-10 rounded-2xl border border-gray-100 shadow-xl">
                        <h2 class="text-2xl font-bold text-dark mb-6">Send us a Message</h2>
                        <form class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
                                    <input type="text" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="John">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
                                    <input type="text" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="Doe">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                                <input type="email" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="john@example.com">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Message</label>
                                <textarea rows="4" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="How can we help you?"></textarea>
                            </div>
                            <button type="button" class="w-full bg-primary text-white font-bold py-4 rounded-xl hover:bg-secondary transition-colors shadow-lg shadow-primary/30 text-lg">
                                Send Message
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script>lucide.createIcons();</script>
</body>
</html>
