<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Emdaad Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: "#ffffff",
                        foreground: "#222222",
                        primary: "#5A9E45", 
                        secondary: "#7EAF64", 
                        accent: "#f5f5f5", 
                        dark: "#252525", 
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        body { background: #ffffff; color: var(--foreground); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
    </style>
</head>
<body class="antialiased text-gray-800 selection:bg-primary selection:text-white bg-gray-50">
    <!-- Navigation -->
    <nav class="border-b border-gray-200 sticky top-0 bg-white/90 backdrop-blur-md z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-24">
                <a href="index.html" class="flex-shrink-0 flex items-center gap-2 cursor-pointer">
                    <img src="https://emdaadfood.com/wp-content/uploads/2024/02/Emdaad-logo.png" alt="Emdaad Food Trading" class="h-16 object-contain">
                </a>
                <div class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-gray-600 font-medium hover:text-primary transition-colors pb-1">Home</a>
                    <a href="shop.html" class="text-dark font-medium hover:text-primary transition-colors border-b-2 border-primary pb-1">Shop</a>
                    <a href="categories.html" class="text-gray-600 font-medium hover:text-primary transition-colors pb-1">Categories</a>
                    <a href="about.html" class="text-gray-600 font-medium hover:text-primary transition-colors pb-1">About us</a>
                    <a href="contact.html" class="text-gray-600 font-medium hover:text-primary transition-colors pb-1">Contact us</a>
                </div>
                <div class="flex items-center gap-6">
                    <button class="text-gray-600 hover:text-primary transition-colors"><i data-lucide="search" class="w-5 h-5"></i></button>
                    <button class="text-gray-600 hover:text-primary transition-colors relative">
                        <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                        <span class="absolute -top-2 -right-2 bg-primary text-white text-xs font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span>
                    </button>
                    <button class="md:hidden text-gray-600"><i data-lucide="menu" class="w-6 h-6"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="bg-dark text-white py-12 relative overflow-hidden">
        <div class="absolute inset-0 bg-primary/10"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <h1 class="text-4xl font-bold mb-4">Shop</h1>
            <div class="flex items-center text-sm text-gray-400 gap-2">
                <a href="index.html" class="hover:text-white transition-colors">Home</a>
                <i data-lucide="chevron-right" class="w-4 h-4"></i>
                <span class="text-white">Shop</span>
            </div>
        </div>
    </div>

    <!-- Shop Content -->
    <section class="py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col lg:flex-row gap-8">
                
                <!-- Sidebar Filters -->
                <aside class="w-full lg:w-1/4 space-y-8">
                    <!-- Categories Filter -->
                    <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                        <h3 class="text-lg font-bold text-dark mb-4 pb-4 border-b border-gray-100">Categories</h3>
                        <ul class="space-y-3">
                            <li>
                                <label class="flex items-center gap-3 cursor-pointer group">
                                    <input type="checkbox" class="w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary" checked>
                                    <span class="text-gray-600 group-hover:text-primary transition-colors">All Products (45)</span>
                                </label>
                            </li>
                            <li>
                                <label class="flex items-center gap-3 cursor-pointer group">
                                    <input type="checkbox" class="w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary">
                                    <span class="text-gray-600 group-hover:text-primary transition-colors">Dairy & Cheese (2)</span>
                                </label>
                            </li>
                            <li>
                                <label class="flex items-center gap-3 cursor-pointer group">
                                    <input type="checkbox" class="w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary">
                                    <span class="text-gray-600 group-hover:text-primary transition-colors">Olives & Olive Oil (9)</span>
                                </label>
                            </li>
                            <li>
                                <label class="flex items-center gap-3 cursor-pointer group">
                                    <input type="checkbox" class="w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary">
                                    <span class="text-gray-600 group-hover:text-primary transition-colors">TEA & COFFEE (26)</span>
                                </label>
                            </li>
                            <li>
                                <label class="flex items-center gap-3 cursor-pointer group">
                                    <input type="checkbox" class="w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary">
                                    <span class="text-gray-600 group-hover:text-primary transition-colors">Pickles (9)</span>
                                </label>
                            </li>
                        </ul>
                    </div>

                    <!-- Price Filter -->
                    <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                        <h3 class="text-lg font-bold text-dark mb-4 pb-4 border-b border-gray-100">Filter by Price</h3>
                        <input type="range" min="0" max="1000" value="500" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer mb-4 accent-primary">
                        <div class="flex justify-between items-center text-sm text-gray-600 font-medium">
                            <span>AED 0</span>
                            <span>AED 1000</span>
                        </div>
                    </div>
                </aside>

                <!-- Products Grid -->
                <div class="flex-1">
                    <!-- Toolbar -->
                    <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm mb-8 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <p class="text-gray-500">Showing 1–12 of 45 results</p>
                        <div class="flex items-center gap-4">
                            <select class="bg-gray-50 border border-gray-200 text-gray-700 rounded-lg focus:ring-primary focus:border-primary block p-2.5 outline-none">
                                <option>Sort by latest</option>
                                <option>Sort by popularity</option>
                                <option>Sort by price: low to high</option>
                                <option>Sort by price: high to low</option>
                            </select>
                        </div>
                    </div>

                    <!-- Products -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6" id="shop-products">
                        <!-- Injected via JS -->
                    </div>

                    <!-- Pagination -->
                    <div class="flex justify-center gap-2 mt-12">
                        <button class="w-10 h-10 rounded-xl bg-primary text-white font-bold flex items-center justify-center shadow-md">1</button>
                        <button class="w-10 h-10 rounded-xl bg-white text-gray-600 font-bold flex items-center justify-center border border-gray-200 hover:border-primary hover:text-primary transition-colors">2</button>
                        <button class="w-10 h-10 rounded-xl bg-white text-gray-600 font-bold flex items-center justify-center border border-gray-200 hover:border-primary hover:text-primary transition-colors">3</button>
                        <button class="w-10 h-10 rounded-xl bg-white text-gray-600 font-bold flex items-center justify-center border border-gray-200 hover:border-primary hover:text-primary transition-colors"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-[#1A1A1A] text-gray-300 pt-16 pb-8 border-t-4 border-primary mt-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center text-sm text-gray-500">
                &copy; 2024 Emdaad Food Trading. All rights reserved.
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        const products = [
            { id: 1, name: "Al Attar Aniseed", arName: "العطار يانسون 20 ظرف", price: 13.0, oldPrice: 15.0, cat: "TEA & COFFEE", img: "https://placehold.co/400x400/f5f5f5/5A9E45?text=Aniseed" },
            { id: 2, name: "Premium Olive Oil", arName: "زيت زيتون بكر ممتاز", price: 45.0, oldPrice: null, cat: "Olives & Olive Oil", img: "https://placehold.co/400x400/f5f5f5/5A9E45?text=Olive+Oil" },
            { id: 3, name: "Syrian Cheese Mix", arName: "مشكل أجبان سورية", price: 25.0, oldPrice: 30.0, cat: "Dairy & Cheese", img: "https://placehold.co/400x400/f5f5f5/5A9E45?text=Cheese" },
            { id: 4, name: "Al Attar Chamomile", arName: "العطار أزهار البابونج", price: 13.0, oldPrice: 15.0, cat: "TEA & COFFEE", img: "https://placehold.co/400x400/f5f5f5/5A9E45?text=Chamomile" },
            { id: 5, name: "Al Attar Ginger", arName: "العطار زنجبيل 20 ظرف", price: 13.0, oldPrice: 15.0, cat: "TEA & COFFEE", img: "https://placehold.co/400x400/f5f5f5/5A9E45?text=Ginger" },
            { id: 6, name: "Pickled Cucumbers", arName: "مخلل خيار", price: 18.0, oldPrice: null, cat: "Pickles", img: "https://placehold.co/400x400/f5f5f5/5A9E45?text=Pickles" }
        ];

        const container = document.getElementById('shop-products');
        products.forEach(p => {
            let saleBadge = p.oldPrice ? `<div class="absolute top-4 left-4 bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-full z-10 shadow-sm">Sale</div>` : '';
            let priceHtml = `<span class="text-primary font-bold text-xl">AED ${p.price.toFixed(2)}</span>`;
            if(p.oldPrice) priceHtml += `<span class="text-gray-400 line-through text-sm ml-2 font-medium">AED ${p.oldPrice.toFixed(2)}</span>`;

            container.innerHTML += `
                <a href="product.html" class="group cursor-pointer bg-white rounded-2xl p-4 shadow-sm hover:shadow-xl transition-all duration-300 border border-gray-100 block">
                    <div class="relative aspect-square rounded-xl overflow-hidden bg-gray-50 mb-4 group-hover:border-primary/30 transition-colors">
                        ${saleBadge}
                        <img src="${p.img}" alt="${p.name}" class="w-full h-full object-cover opacity-90 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500 mix-blend-multiply" />
                        <div class="absolute inset-x-4 bottom-4 translate-y-16 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300">
                            <button class="w-full bg-primary text-white font-bold py-3 rounded-xl hover:bg-secondary shadow-lg">View Details</button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between items-start">
                            <p class="text-xs text-gray-500 font-medium uppercase tracking-wide">${p.cat}</p>
                        </div>
                        <h3 class="font-bold text-lg leading-tight truncate text-dark">${p.name}</h3>
                        <p class="text-gray-500 text-sm mb-2" dir="rtl">${p.arName}</p>
                        <div class="flex items-center pt-2 border-t border-gray-100">${priceHtml}</div>
                    </div>
                </a>
            `;
        });
    </script>
</body>
</html>
